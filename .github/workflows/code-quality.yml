name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    name: Code Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests with Coverage
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: reportgenerator -reports:./coverage/**/coverage.cobertura.xml -targetdir:./coveragereport -reporttypes:"Html;Cobertura"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coveragereport

      - name: Generate Coverage Summary
        if: always()
        run: |
          # NOTE: pipe the string itself to Out-File. `Write-Host | Out-File` writes
          # nothing to the file (Write-Host goes to the host, not the pipeline), which
          # produced an empty summary and broke the PR-comment step.
          $coberturaFile = "./coveragereport/Cobertura.xml"
          $summary = "## Code Coverage Summary`n`n"
          if (Test-Path $coberturaFile) {
            try {
              [xml]$xml = Get-Content $coberturaFile
              $lineRate = [math]::Round([double]$xml.coverage.'line-rate' * 100, 2)
              $branchRate = [math]::Round([double]$xml.coverage.'branch-rate' * 100, 2)
              $summary += "| Metric | Coverage |`n| --- | --- |`n| Line | $lineRate% |`n| Branch | $branchRate% |`n`nView the full report in the **coverage-report** artifact."
            } catch {
              $summary += "Coverage was generated, but the summary could not be parsed."
            }
          } else {
            $summary += "Coverage report not found or failed to generate."
          }
          $summary | Out-File -FilePath coverage-summary.md -Encoding utf8
          Write-Host $summary

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request' && always()
        with:
          recreate: true
          path: coverage-summary.md
